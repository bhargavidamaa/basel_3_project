version: '3.8'
 
x-airflow-common:
  &airflow-common

  build: .
  image: custom-airflow-spark:latest

  environment:

    - AIRFLOW__CORE__EXECUTOR=LocalExecutor

    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow

    - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNpKFCRLkNdTZ6bRo8wJc=

    - AIRFLOW__CORE__LOAD_EXAMPLES=false

    - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-apache-spark faker requests

  volumes:

    - ./dags:/opt/airflow/dags

    - ./logs:/opt/airflow/logs

    - ./plugins:/opt/airflow/plugins

    - ./data:/opt/airflow/data

    - ./spark_scripts:/opt/airflow/spark_scripts

  depends_on:

    postgres:

      condition: service_healthy
 
services:

  # ------------------------------------

  # 1. PostgreSQL (Metadata & Metrics)

  # ------------------------------------

  postgres:

    image: postgres:15

    environment:

      - POSTGRES_USER=airflow

      - POSTGRES_PASSWORD=airflow

      - POSTGRES_DB=airflow

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD", "pg_isready", "-U", "airflow"]

      interval: 10s

      retries: 5

      start_period: 5s
 
  # ------------------------------------

  # 2. Apache Spark Cluster

  # ------------------------------------

  spark-master:

    image: bitnamilegacy/spark:3.5.3

    environment:

      - SPARK_MODE=master

      - SPARK_RPC_AUTHENTICATION_ENABLED=no

      - SPARK_RPC_ENCRYPTION_ENABLED=no

      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no

      - SPARK_SSL_ENABLED=no

    ports:

      - "9090:8080"  # Mapped to 9090 to avoid conflict with Airflow

      - "7077:7077"

    volumes:

      - ./data:/opt/bitnami/spark/data

      - ./spark_scripts:/opt/bitnami/spark/scripts
 
  spark-worker:

    image: bitnamilegacy/spark:3.5.3

    environment:

      - SPARK_MODE=worker

      - SPARK_MASTER_URL=spark://spark-master:7077

      - SPARK_WORKER_MEMORY=2G

      - SPARK_WORKER_CORES=2

      - SPARK_RPC_AUTHENTICATION_ENABLED=no

      - SPARK_RPC_ENCRYPTION_ENABLED=no

      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no

      - SPARK_SSL_ENABLED=no

    depends_on:

      - spark-master

    volumes:

      - ./data:/opt/bitnami/spark/data

      - ./spark_scripts:/opt/bitnami/spark/scripts
 
  # ------------------------------------

  # 3. Apache Airflow (Orchestration)

  # ------------------------------------

  airflow-init:
    <<: *airflow-common

    command: version

    environment:

      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow

      - _AIRFLOW_DB_UPGRADE=true

      - _AIRFLOW_WWW_USER_CREATE=true

      - _AIRFLOW_WWW_USER_USERNAME=admin

      - _AIRFLOW_WWW_USER_PASSWORD=admin

    depends_on:

      postgres:

        condition: service_healthy
 
  airflow-webserver:
    <<: *airflow-common

    command: webserver

    ports:

      - "8080:8080"

    depends_on:

      airflow-init:

        condition: service_completed_successfully
 
  airflow-scheduler:
    <<: *airflow-common

    command: scheduler

    depends_on:

      airflow-init:

        condition: service_completed_successfully
 
volumes:

  postgres_data:
 